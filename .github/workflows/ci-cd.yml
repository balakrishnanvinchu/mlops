name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cats-dogs-classifier

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Code quality checks
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check src/ tests/
    
    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: true

  build-image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  smoke-tests:
    needs: build-image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pillow
    
    - name: Start Docker Compose
      run: |
        docker-compose -f deploy/docker-compose/docker-compose.yml up -d
    
    - name: Wait for service to be ready
      run: |
        for i in {1..30}; do
          if docker-compose -f deploy/docker-compose/docker-compose.yml exec -T inference-api curl -f http://localhost:8000/health > /dev/null 2>&1; then
            echo "Service is ready"
            exit 0
          fi
          echo "Waiting for service... ($i/30)"
          sleep 2
        done
        exit 1
    
    - name: Run smoke tests
      run: |
        python -c "
        import requests
        import base64
        from PIL import Image
        from io import BytesIO
        
        # Test health endpoint
        response = requests.get('http://localhost:8000/health')
        assert response.status_code == 200
        print('✓ Health check passed')
        
        # Create test image
        img = Image.new('RGB', (224, 224), color=(100, 150, 200))
        buffer = BytesIO()
        img.save(buffer, format='JPEG')
        b64_image = base64.b64encode(buffer.getvalue()).decode()
        
        # Test prediction endpoint
        response = requests.post(
          'http://localhost:8000/predict',
          json={'image': b64_image}
        )
        assert response.status_code == 200
        data = response.json()
        assert 'prediction' in data
        assert data['prediction'] in ['cat', 'dog']
        print(f'✓ Prediction test passed: {data[\"prediction\"]}')
        
        # Test metrics endpoint
        response = requests.get('http://localhost:8000/metrics')
        assert response.status_code == 200
        print('✓ Metrics endpoint test passed')
        "
    
    - name: Stop Docker Compose
      if: always()
      run: docker-compose -f deploy/docker-compose/docker-compose.yml down
