stages:
  data_preprocessing:
    cmd: python src/data/preprocessing.py
    deps:
      - data/raw
      - src/data/preprocessing.py
    outs:
      - data/processed/train_data
      - data/processed/val_data
      - data/processed/test_data
  
  model_training:
    cmd: python src/models/train.py
    deps:
      - data/processed
      - src/models/train.py
      - src/models/cnn_model.py
    params:
      - params.yaml:
          - model.epochs
          - model.batch_size
          - model.learning_rate
    metrics:
      - models/metrics.json:
          cache: false
    outs:
      - models/artifacts/model.pt:
          cache: false
